<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<title>Projects — Menasco Collaboration Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div class="topbar-brand">
      <span class="mark"><img src="assets/menasco-mark-white.png" alt="Menasco"></span>
      <span>MENASCO</span>
    </div>
    <div class="topbar-search">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" placeholder="Search the hub...">
    </div>
    <nav class="topbar-nav">
      <a href="index.html">Dashboard</a>
      <a href="projects.html" class="active">Projects</a>
      <a href="shared-links.html">Shared links</a>
      <a href="deadlines.html">Deadlines</a>
      <a href="rfis.html">RFIs</a>
      <a href="announcements.html">Announcements</a>
      <a href="contacts.html">Contacts</a>
    </nav>
    <div class="topbar-right">
      <i class="ti ti-bell" aria-hidden="true"></i>
      <i class="ti ti-help" aria-hidden="true"></i>
      <span class="topbar-avatar">EH</span>
    </div>
  </header>

  <div class="app-body">

    <aside class="left-rail">
      <a class="rail-stat accent" href="#browser-root">
        <div class="num" id="stat-projects">0</div>
        <div class="label">Projects</div>
      </a>
      <a class="rail-stat" href="#browser-root">
        <div class="num" id="stat-items">0</div>
        <div class="label">Total items</div>
      </a>

      <div class="rail-actions">
        <button class="btn-rail primary" id="btn-new-project"><i class="ti ti-plus" aria-hidden="true"></i>New project</button>
        <button class="btn-rail" id="btn-sync-drive" style="gap:6px;"><i class="ti ti-brand-google-drive" aria-hidden="true"></i>Sync from Drive</button>
      </div>

      <div class="rail-divider"></div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);margin-bottom:8px;padding:0 4px;">Projects</div>
      <div class="tree" id="project-tree"></div>
    </aside>

    <main class="main-panel">
      <div class="panel-toolbar">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="panel-toolbar-right">
          <div class="panel-search">
            <i class="ti ti-search" aria-hidden="true"></i>
            <input type="text" placeholder="Search this view" id="browser-search">
          </div>
          <button class="btn" id="btn-filter"><i class="ti ti-filter" aria-hidden="true"></i> Filter</button>
          <button class="btn btn-primary" id="btn-share-folder"><svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true" style="flex-shrink:0;vertical-align:-2px;margin-right:4px;"><circle cx="6" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/><line x1="8.6" y1="10.7" x2="15.4" y2="7.3" stroke="currentColor" stroke-width="2"/><line x1="8.6" y1="13.3" x2="15.4" y2="16.7" stroke="currentColor" stroke-width="2"/></svg>Share a folder</button>
        </div>
      </div>

      <div class="filter-pop" id="filter-popover">
        <h4>Project</h4>
        <div class="filter-field"><select id="filter-project"><option value="">All projects</option></select></div>
        <h4>Department</h4>
        <div class="filter-field"><select id="filter-dept"><option value="">All departments</option></select></div>
        <h4>Status</h4>
        <div class="filter-field">
          <select id="filter-status">
            <option value="">Any status</option>
            <option value="Final">Final</option>
            <option value="In review">In review</option>
            <option value="New">New</option>
            <option value="Checked out">Checked out</option>
          </select>
        </div>
        <div class="filter-pop-foot">
          <button class="btn" id="filter-clear" style="flex:1;">Clear</button>
          <button class="btn btn-primary" id="filter-apply" style="flex:1;">Apply</button>
        </div>
      </div>

      <div class="panel-body" id="browser-root"></div>

      <div class="dt-foot">
        <span id="browser-foot-count">—</span>
        <span>Last refreshed 2026-06-26</span>
      </div>
    </main>
  </div>
</div>
<script src="assets/drive-config.js"></script>
<script src="assets/drive.js"></script>
<script src="assets/projects.js"></script>
<script src="assets/search.js"></script>
<script src="assets/ai-assistant.js"></script>
</body>
</html>
