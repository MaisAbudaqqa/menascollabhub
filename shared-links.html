<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<title>Shared links — Menasco Collaboration Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div class="topbar-brand">
      <span class="mark"><img src="assets/menasco-mark-white.png" alt="Menasco"></span>
      <span>MENASCO</span>
    </div>
    <div class="topbar-search">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" placeholder="Search the hub...">
    </div>
    <nav class="topbar-nav">
      <a href="index.html">Dashboard</a>
      <a href="projects.html">Projects</a>
      <a href="shared-links.html" class="active">Shared links</a>
      <a href="deadlines.html">Deadlines</a>
      <a href="rfis.html">RFIs</a>
      <a href="announcements.html">Announcements</a>
      <a href="contacts.html">Contacts</a>
    </nav>
    <div class="topbar-right">
      <i class="ti ti-bell" aria-hidden="true"></i>
      <i class="ti ti-help" aria-hidden="true"></i>
      <span class="topbar-avatar">EH</span>
    </div>
  </header>

  <div class="app-body">

    <aside class="left-rail">
      <a class="rail-stat accent" href="#shares-table">
        <div class="num" id="stat-total">0</div>
        <div class="label">Total links</div>
      </a>
      <a class="rail-stat" href="#shares-table">
        <div class="num" id="stat-pending">0</div>
        <div class="label">Pending</div>
      </a>
      <a class="rail-stat" href="#shares-table">
        <div class="num" id="stat-accessed">0</div>
        <div class="label">Accessed</div>
      </a>
    </aside>

    <main class="main-panel" id="shares-table">
      <div class="panel-toolbar">
        <div class="breadcrumb"><span class="current">Shared links</span></div>
        <div class="panel-toolbar-right">
          <button class="btn btn-primary" id="btn-share-folder"><svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true" style="flex-shrink:0;vertical-align:-2px;margin-right:4px;"><circle cx="6" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/><line x1="8.6" y1="10.7" x2="15.4" y2="7.3" stroke="currentColor" stroke-width="2"/><line x1="8.6" y1="13.3" x2="15.4" y2="16.7" stroke="currentColor" stroke-width="2"/></svg>Share a folder</button>
        </div>
      </div>

      <div class="panel-body">
        <div class="shares-section" style="border:none;padding:18px 20px;">
          <div class="section-head">
            <h3>Shared links <span id="shares-count" style="font-weight:400;font-size:12.5px;color:var(--text-muted);"></span></h3>
            <span style="font-size:12px;color:var(--text-muted);">Each link needs its one-time code to open — codes can't be reused once a supplier redeems them.</span>
          </div>
          <div class="dt-wrap">
          <table class="dt">
            <thead>
              <tr>
                <th>Folder / item</th>
                <th>Shared with</th>
                <th>Status</th>
                <th>Created</th>
                <th>Accessed</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="shares-tbody"></tbody>
          </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="assets/projects.js"></script>
<script src="assets/shared-links.js"></script>
<script src="assets/search.js"></script>
<script src="assets/ai-assistant.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var btn = document.getElementById("btn-share-folder");
    if (btn) btn.addEventListener("click", function () { window.HUB.openSharePicker(); });
  });
</script>
</body>
</html>
