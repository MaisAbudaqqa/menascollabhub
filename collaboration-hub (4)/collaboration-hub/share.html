<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/favicon-32.png">
<title>Shared folder — Menasco Collaboration Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="share-access-shell">
  <div class="share-access-card" id="card">
    <span class="mark"><img src="assets/menasco-mark-dark.png" alt="Menasco"></span>
    <div id="card-body">Loading…</div>
  </div>
</div>

<script src="assets/drive-config.js"></script>
<script src="assets/drive.js"></script>
<script src="assets/status-sync.js"></script>
<script>
(function () {
  "use strict";

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function simpleHash(str) {
    var hash = 5381;
    for (var i = 0; i < str.length; i++) {
      hash = ((hash << 5) + hash) ^ str.charCodeAt(i);
      hash = hash & hash;
    }
    return Math.abs(hash).toString(36);
  }

  function fileIcon(mimeType) {
    if (!mimeType) return "ti-file-text";
    if (mimeType.indexOf("folder") !== -1) return "ti-folder";
    if (mimeType.indexOf("pdf") !== -1) return "ti-file-type-pdf";
    if (mimeType.indexOf("spreadsheet") !== -1 || mimeType.indexOf("excel") !== -1) return "ti-file-spreadsheet";
    if (mimeType.indexOf("document") !== -1 || mimeType.indexOf("word") !== -1) return "ti-file-word";
    if (mimeType.indexOf("presentation") !== -1 || mimeType.indexOf("powerpoint") !== -1) return "ti-file-presentation";
    if (mimeType.indexOf("image") !== -1) return "ti-photo";
    return "ti-file-text";
  }

  function googleDownloadUrl(fileId, mimeType) {
    if (mimeType === "application/vnd.google-apps.document")
      return "https://docs.google.com/document/d/" + fileId + "/export?format=docx";
    if (mimeType === "application/vnd.google-apps.spreadsheet")
      return "https://docs.google.com/spreadsheets/d/" + fileId + "/export?format=xlsx";
    if (mimeType === "application/vnd.google-apps.presentation")
      return "https://docs.google.com/presentation/d/" + fileId + "/export?format=pptx";
    return "https://drive.google.com/uc?export=download&id=" + fileId;
  }

  // ---------- local storage for admin tracking (best-effort, not required) ----------
  var LS_SHARES = "hub_shares_v1";
  function getShares() { try { return JSON.parse(localStorage.getItem(LS_SHARES) || "[]"); } catch (e) { return []; } }
  function setShares(s) { try { localStorage.setItem(LS_SHARES, JSON.stringify(s)); } catch (e) {} }

  function markAccessed(token, email) {
    var shares = getShares();
    var idx = shares.findIndex(function (s) { return s.token === token; });
    if (idx > -1) {
      shares[idx].status = "accessed";
      shares[idx].accessedAt = new Date().toISOString();
      if (email) shares[idx].accessEmail = email;
      setShares(shares);
    }
  }

  function saveEmail(token, email) {
    var shares = getShares();
    var idx = shares.findIndex(function (s) { return s.token === token; });
    if (idx > -1) { shares[idx].accessEmail = email; setShares(shares); }
  }

  // ---------- parse URL ----------
  var params = new URLSearchParams(location.search);
  var body = document.getElementById("card-body");
  var record = null;
  var usedLocalStorage = false;

  // NEW format: ?d=base64encodedpayload
  var dParam = params.get("d");
  if (dParam) {
    try {
      record = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(dParam)))));
    } catch (e) {
      record = null;
    }
  }

  // LEGACY format: ?token=xxx (same browser only)
  if (!record) {
    var token = params.get("token");
    if (token) {
      var shares = getShares();
      var found = shares.find(function (s) { return s.token === token; });
      if (found) { record = found; usedLocalStorage = true; }
    }
  }

  if (!record) {
    body.innerHTML =
      '<h2>Link not found</h2>' +
      '<p class="sub">This share link is invalid or may have expired. Ask the project admin to generate a new link.</p>';
    return;
  }

  // ---------- per-token state (localStorage so it persists across tabs/sessions) ----------
  var ACCESS_KEY = "hub_access_" + record.token;
  function getState() { try { return JSON.parse(localStorage.getItem(ACCESS_KEY) || "{}"); } catch(e) { return {}; } }
  function setState(obj) { try { localStorage.setItem(ACCESS_KEY, JSON.stringify(Object.assign(getState(), obj))); } catch(e) {} }

  // Mark accessed — updates admin's localStorage IF on the same browser,
  // AND writes a cross-device status record keyed by token so the admin
  // page can detect it by checking hub_accessed_STATUS_TOKEN keys.
  function markAccessed(token, email) {
    // Update admin share record if on same browser
    var shares = getShares();
    var idx = shares.findIndex(function (s) { return s.token === token; });
    if (idx > -1) {
      shares[idx].status = "accessed";
      shares[idx].accessedAt = new Date().toISOString();
      if (email) shares[idx].accessEmail = email;
      setShares(shares);
    }
    // Also write a cross-device status record — admin page picks this up
    try {
      localStorage.setItem("hub_status_" + token, JSON.stringify({
        status: "accessed",
        accessedAt: new Date().toISOString(),
        email: email || ""
      }));
    } catch(e) {}
  }

  function saveEmail(token, email) {
    // Update local share record
    var shares = getShares();
    var idx = shares.findIndex(function (s) { return s.token === token; });
    if (idx > -1) { shares[idx].accessEmail = email; setShares(shares); }
    // Update cross-device record
    try {
      var existing = JSON.parse(localStorage.getItem("hub_status_" + token) || "{}");
      existing.email = email;
      localStorage.setItem("hub_status_" + token, JSON.stringify(existing));
    } catch(e) {}
    // Update access state
    setState({ email: email });
  }

  // Call StatusSync to record access cross-device via jsonblob.com
  function notifyAccessed(blobId, token, scopeName, supplierName, email) {
    if (!blobId || !window.StatusSync) return;
    window.StatusSync.markAccessed(blobId, token, scopeName, supplierName, email).catch(function(){});
  }

  // ---------- render ----------
  function render() {
    var state = getState();

    // Check if revoked in admin localStorage
    if (usedLocalStorage && record.status === "revoked") {
      body.innerHTML = '<h2>Link revoked</h2><p class="sub">The project admin has turned off access to this folder.</p>';
      return;
    }

    if (state.accessed) {
      renderFolder(true);
      return;
    }

    // Show code entry
    body.innerHTML =
      '<h2>Enter your access code</h2>' +
      '<p class="sub">The project admin shared <strong>' + escapeHtml(record.scopeName) + '</strong> with you. Enter the 6-digit code they sent you separately.</p>' +
      '<div class="code-input-row" id="code-row">' +
        [0,1,2,3,4,5].map(function(i) {
          return '<input inputmode="numeric" maxlength="1" data-i="' + i + '">' + (i === 2 ? '<span class="code-dash">-</span>' : '');
        }).join("") +
      '</div>' +
      '<div class="share-access-error" id="code-error"></div>' +
      '<button class="btn btn-primary" id="code-submit" style="width:100%;">Unlock folder</button>';

    var inputs = Array.prototype.slice.call(document.querySelectorAll("#code-row input"));
    inputs[0].focus();
    inputs.forEach(function (inp, i) {
      inp.addEventListener("input", function () {
        inp.value = inp.value.replace(/[^0-9]/g, "").slice(0, 1);
        if (inp.value && inputs[i + 1]) inputs[i + 1].focus();
      });
      inp.addEventListener("keydown", function (e) {
        if (e.key === "Backspace" && !inp.value && inputs[i - 1]) inputs[i - 1].focus();
        if (e.key === "Enter") submit();
      });
    });

    document.getElementById("code-submit").addEventListener("click", submit);

    function submit() {
      var entered = inputs.map(function (i) { return i.value; }).join("");
      var errEl = document.getElementById("code-error");
      if (entered.length < 6) { errEl.textContent = "Enter all 6 digits."; return; }

      var state = getState();
      var attempts = state.attempts || 0;

      // Verify: hash(token + enteredCode) must match codeHash stored in URL payload
      var valid = false;
      if (record.codeHash) {
        valid = simpleHash(record.token + entered) === record.codeHash;
      } else if (usedLocalStorage && record.code) {
        // legacy localStorage path
        valid = entered === record.code;
      }

      if (valid) {
        setState({ accessed: true, attempts: attempts + 1, accessedAt: new Date().toISOString() });
        markAccessed(record.token, "");
        notifyAccessed(record.blobId, record.token, record.scopeName, record.supplierName, "");
        renderFolder(false);
      } else {
        attempts++;
        setState({ attempts: attempts });
        if (attempts >= 5) {
          body.innerHTML = '<h2>Too many attempts</h2><p class="sub">This link has been locked after 5 incorrect attempts. Ask the project admin for a new link.</p>';
          return;
        }
        errEl.textContent = "That code isn't right — " + (5 - attempts) + " attempt" + (5 - attempts === 1 ? "" : "s") + " left.";
        inputs.forEach(function (i) { i.value = ""; });
        inputs[0].focus();
      }
    }
  }

  // ---------- folder view ----------
  function renderFolder(alreadyUsed) {
    var driveUrl = record.driveUrl || "";
    var folderId = window.DriveHub ? window.DriveHub.extractFolderId(driveUrl) : "";

    function wireEmail() {
      var emailInput = document.getElementById("saf-email");
      if (!emailInput) return;
      emailInput.addEventListener("blur", function () {
        var em = emailInput.value.trim();
        setState(Object.assign(getState(), { email: em }));
        saveEmail(record.token, em);
        if (record.blobId && window.StatusSync) {
          window.StatusSync.markAccessed(record.blobId, record.token, record.scopeName, record.supplierName, em).catch(function(){});
        }
      });
    }

    var savedEmail = (getState().email) || "";

    function buildFileRow(name, mimeType, fileId, webViewLink) {
      var isFolder = mimeType && mimeType.indexOf("folder") !== -1;
      var icon = fileIcon(mimeType);
      var viewUrl = webViewLink || driveUrl || "#";
      var dlUrl = fileId ? googleDownloadUrl(fileId, mimeType) : viewUrl;

      if (isFolder) {
        return '<div class="saf-item saf-file-row">' +
          '<i class="ti ' + icon + ' saf-file-icon"></i>' +
          '<span class="saf-file-name">' + escapeHtml(name) + '</span>' +
          '<span class="saf-file-actions"><a class="saf-btn-open" href="' + escapeHtml(viewUrl) + '" target="_blank" rel="noopener">Open</a></span>' +
          '</div>';
      }
      return '<div class="saf-item saf-file-row">' +
        '<i class="ti ' + icon + ' saf-file-icon"></i>' +
        '<span class="saf-file-name">' + escapeHtml(name) + '</span>' +
        '<span class="saf-file-actions">' +
          '<a class="saf-btn-open" href="' + escapeHtml(viewUrl) + '" target="_blank" rel="noopener">View</a>' +
          '<a class="saf-btn-dl" href="' + escapeHtml(dlUrl) + '" target="_blank" rel="noopener"><i class="ti ti-download"></i> Download</a>' +
        '</span>' +
        '</div>';
    }

    var shell =
      '<h2>Access granted</h2>' +
      '<p class="sub">' + (alreadyUsed ? "You already unlocked this folder. " : "You're in. ") + 'Download any file below.</p>' +
      '<div class="field" style="margin-bottom:14px;">' +
        '<label style="font-size:13px;font-weight:500;display:block;margin-bottom:5px;">Your email <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>' +
        '<input type="email" id="saf-email" placeholder="you@supplier.com" value="' + escapeHtml(savedEmail) + '" style="width:100%;box-sizing:border-box;">' +
      '</div>' +
      '<div class="share-access-folder" id="saf-list">' +
        '<div class="saf-head"><div class="name">' + escapeHtml(record.scopeName) + '</div><div class="meta">' + escapeHtml(record.projectName || "") + '</div></div>' +
        '<div class="saf-item" style="color:var(--text-muted);justify-content:center;"><i class="ti ti-loader-2" style="margin-right:8px;animation:spin 1s linear infinite;"></i>Loading files…</div>' +
      '</div>' +
      (driveUrl ? '<a class="btn" href="' + escapeHtml(driveUrl) + '" target="_blank" rel="noopener" style="display:block;text-align:center;margin-top:10px;text-decoration:none;"><i class="ti ti-brand-google-drive" style="margin-right:6px;"></i>Open folder in Google Drive</a>' : '') +
      '<p class="share-warning" style="margin-top:14px;">This link has now been used and won\'t accept the code again. If you need access later, ask the admin for a new link.</p>';

    body.innerHTML = shell;
    wireEmail();

    // Load files from Drive
    if (folderId && window.DriveHub) {
      window.DriveHub.listPublicFiles(folderId).then(function (files) {
        var listEl = document.getElementById("saf-list");
        if (!listEl) return;
        var head = '<div class="saf-head"><div class="name">' + escapeHtml(record.scopeName) + '</div><div class="meta">' + escapeHtml(record.projectName || "") + ' &middot; live from Google Drive</div></div>';
        if (!files.length) {
          listEl.innerHTML = head + '<div class="saf-item" style="color:var(--text-muted)">This Drive folder is currently empty.</div>';
        } else {
          listEl.innerHTML = head + files.map(function (f) { return buildFileRow(f.name, f.mimeType, f.id, f.webViewLink); }).join("");
        }
      }).catch(function () {
        var listEl = document.getElementById("saf-list");
        if (listEl) listEl.innerHTML =
          '<div class="saf-head"><div class="name">' + escapeHtml(record.scopeName) + '</div><div class="meta">' + escapeHtml(record.projectName || "") + '</div></div>' +
          '<div class="saf-item" style="color:var(--text-muted)">Could not load files — use the button below to open the folder directly in Google Drive.</div>';
      });
    } else if (!driveUrl) {
      var listEl = document.getElementById("saf-list");
      if (listEl) listEl.innerHTML =
        '<div class="saf-head"><div class="name">' + escapeHtml(record.scopeName) + '</div><div class="meta">' + escapeHtml(record.projectName || "") + '</div></div>' +
        '<div class="saf-item" style="color:var(--text-muted)">No Drive folder linked yet. Ask the admin to set one up.</div>';
    }
  }

  render();
})();
</script>
</body>
</html>
